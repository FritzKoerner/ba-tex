<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 530 330"
     font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5"
      markerWidth="10" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
    <linearGradient id="grad-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5698f9" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5698f9" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="grad-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60aa64" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#60aa64" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="530" height="330" fill="#ffffff" rx="8"/>

  <!-- ===== AGENT BOX (top center) ===== -->
  <rect x="195" y="30" width="170" height="58" rx="8"
        fill="url(#grad-blue)" stroke="#5698f9" stroke-width="2"/>
  <text x="280" y="65" text-anchor="middle" font-size="17"
        fill="#2a5a9a" font-weight="700">Agent</text>

  <!-- ===== ENVIRONMENT BOX (bottom center) ===== -->
  <rect x="195" y="240" width="170" height="58" rx="8"
        fill="url(#grad-green)" stroke="#60aa64" stroke-width="2"/>
  <text x="280" y="275" text-anchor="middle" font-size="17"
        fill="#3a6a3e" font-weight="700">Umgebung</text>

  <!-- ===== RIGHT PATH: Agent → Environment (Aktion) ===== -->
  <line x1="365" y1="59" x2="430" y2="59"
        stroke="#888" stroke-width="1.4"/>
  <line x1="430" y1="59" x2="430" y2="269"
        stroke="#888" stroke-width="1.4"/>
  <line x1="430" y1="269" x2="373" y2="269"
        stroke="#888" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Aktion label (right side) -->
  <text x="448" y="158" font-size="12" fill="#888" font-weight="600">Aktion</text>
  <text x="448" y="178" font-size="15" fill="#555" font-style="italic">A<tspan font-size="11" dy="4">t</tspan></text>

  <!-- ===== LEFT PATH: Two separate parallel lines ===== -->

  <!-- State line (outer, x=100): env branch → vertical → agent entry (upper) -->
  <line x1="195" y1="278" x2="100" y2="278"
        stroke="#888" stroke-width="1.4"/>
  <line x1="100" y1="278" x2="100" y2="50"
        stroke="#888" stroke-width="1.4"/>
  <line x1="100" y1="50" x2="187" y2="50"
        stroke="#888" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Reward line (inner, x=140): env branch → vertical → agent entry (lower) -->
  <line x1="195" y1="253" x2="140" y2="253"
        stroke="#888" stroke-width="1.4"/>
  <line x1="140" y1="253" x2="140" y2="66"
        stroke="#888" stroke-width="1.4"/>
  <line x1="140" y1="66" x2="187" y2="66"
        stroke="#888" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Dotted divider line -->
  <line x1="60" y1="225" x2="180" y2="225"
        stroke="#888" stroke-width="1.0" stroke-dasharray="4,3"/>

  <!-- Labels above divider: S_t and R_t next to their lines -->
  <text x="90" y="160" font-size="14" fill="#555" font-style="italic"
        text-anchor="end">S<tspan font-size="10" dy="4">t</tspan></text>
  <text x="150" y="160" font-size="14" fill="#555" font-style="italic"
        text-anchor="start">R<tspan font-size="10" dy="4">t</tspan></text>

  <!-- Labels below divider: R_{t+1} and S_{t+1} on branches -->
  <text x="168" y="247" font-size="12" fill="#888" font-style="italic"
        text-anchor="middle">R<tspan font-size="9" dy="3">t+1</tspan></text>
  <text x="168" y="272" font-size="12" fill="#888" font-style="italic"
        text-anchor="middle">S<tspan font-size="9" dy="3">t+1</tspan></text>

</svg>
